    <style>
        :root {
            --bg-body: #0F1115;
            --bg-card: #1C1D26;
            --bg-input: #272935;
            --bg-input-hover: #323544;
            --accent-blue: #3B82F6;
            --accent-blue-hover: #2563EB;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border-color: #333645;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background-color: #15161E;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* --- TOP HEADER --- */
        .top-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .top-meta h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .meta-stats {
            display: flex;
            gap: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
        }

        .meta-stat {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.2rem;
        }

        .meta-value {
            font-weight: 700;
            color: var(--text-main);
        }

            font-weight: 700;
