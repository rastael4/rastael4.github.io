<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNsure Navigator Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0F1115;
            --bg-card: #1C1D26;
            --accent-blue: #3B82F6;
            --text-main: #FFFFFF;
            --text-muted: #94A3B8;
            --border-color: #333645;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background-color: var(--bg-card);
            border-radius: 24px;
            padding: 3rem 2rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        p.subtitle { color: var(--text-muted); font-size: 1.1rem; }

        .services {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .service-card {
            background: rgba(255,255,255,0.03);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .service-card h3 { color: var(--accent-blue); margin-bottom: 0.5rem; font-size: 1rem; }
        .service-card p { font-size: 0.85rem; color: var(--text-muted); }

        .contact-area {
            background: rgba(255,255,255,0.02);
            padding: 2.5rem;
            border-radius: 20px;
            text-align: center;
            border: 1px dashed var(--border-color);
        }

        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            margin: 0.5rem;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--accent-blue); color: white; }
        .btn-outline { border: 1px solid var(--border-color); color: white; }
        
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="badge">Official Navigator Services</span>
            <h1>MNsure Help</h1>
            <p class="subtitle">Free assistance with health insurance applications.</p>
        </div>

        <div class="services">
            <div class="service-card">
                <h3>MinnesotaCare</h3>
                <p>Low-cost plans for families.</p>
            </div>
            <div class="service-card">
                <h3>Medical Assistance</h3>
                <p>Minnesota's Medicaid program.</p>
            </div>
            <div class="service-card">
                <h3>Private Plans</h3>
                <p>Tax credits to lower costs.</p>
            </div>
        </div>

        <div class="contact-area">
            <h2 style="margin-bottom: 1rem;">Get in Touch</h2>
            <a href="sms:+15078587188" class="btn btn-primary">Text: +1 (507) 858-7188</a>
            <a href="mailto:navigator@minnesotasure.org" class="btn btn-outline">Email Me</a>
        </div>
    </div>
</body>
</html>
